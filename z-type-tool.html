<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Z.ai type tool — 3-panel</title>
<style>
  :root{ --bg:#000; --panel:#111; --line:#222; --txt:#e8e8e8; --mut:#8a8a8a;
         --accent:#4da3ff; --oblique:#ff5d73; --horiz:#46d39a; --diag:#ffd24d; --fill:#ffffff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
            font:13px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,Arial}
  #app{display:flex;flex-direction:column;height:100%}
  #bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;
       padding:8px 10px;background:var(--panel);border-bottom:1px solid var(--line)}
  #bar .grp{display:flex;gap:4px;align-items:center;padding:0 8px;border-right:1px solid var(--line)}
  #bar .grp:last-child{border-right:0}
  button{background:#1b1b1b;color:var(--txt);border:1px solid #333;border-radius:6px;
         padding:6px 9px;cursor:pointer;font-size:12px}
  button:hover{background:#262626}
  button.on{outline:2px solid var(--accent);background:#0d2238}
  button.oblique.on{outline-color:var(--oblique)}
  button.horiz.on{outline-color:var(--horiz)}
  button.diag.on{outline-color:var(--diag)}
  .split.on{outline:2px solid var(--oblique)}
  .detach.on{outline:2px solid var(--diag)}
  label{color:var(--mut);font-size:11px;display:flex;gap:5px;align-items:center}
  input[type=range]{width:96px}
  #panels{flex:1;min-height:0;display:flex;gap:8px;padding:8px;background:#000}
  .panel{flex:1;min-width:0;display:flex;flex-direction:column;border:1px solid #1c1c1c;border-radius:8px;overflow:hidden;background:#0a0a0a}
  .panel .phead{display:flex;gap:6px;align-items:center;padding:6px 8px;background:var(--panel);border-bottom:1px solid var(--line)}
  .panel .phead select.letter{background:#1b1b1b;color:var(--txt);border:1px solid #333;border-radius:6px;padding:4px 6px;font-size:12px}
  .panel .pbody{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .panel svg{width:100%;height:100%;background:#000;cursor:crosshair;touch-action:none}
  .panel.active{border-color:var(--accent)}
  #status{padding:6px 10px;background:var(--panel);border-top:1px solid var(--line);
          color:var(--mut);font-size:11px;display:flex;gap:16px;flex-wrap:wrap}
  #status b{color:var(--txt)}
  .gline-hit{stroke:transparent;stroke-width:16;cursor:grab}
  .gline-h{stroke:var(--horiz);stroke-width:1.4;pointer-events:none}
  .gline-o{stroke:var(--oblique);stroke-width:1.4;pointer-events:none}
  .gline-d{stroke:var(--diag);stroke-width:1.4;pointer-events:none}
  .axis{stroke:#666;stroke-width:1;stroke-dasharray:10 8;pointer-events:none}
  .mline{stroke:#7a5cff;stroke-width:1;stroke-dasharray:4 6;pointer-events:none}
  .mline-hit{stroke:transparent;stroke-width:14;cursor:ns-resize}
  .mlabel-t{fill:#7a5cff;font-size:18px;pointer-events:none}
  .dpivot{fill:var(--diag);pointer-events:none}
  .node{fill:#fff;opacity:.55;pointer-events:none}
  .cell{fill:var(--fill)}
  .cell.sel{stroke:var(--accent);stroke-width:5;paint-order:stroke}
  .trace{fill:none;stroke:#3ba0ff;stroke-width:2;opacity:.5;pointer-events:none}
  kbd{background:#222;border:1px solid #444;border-radius:4px;padding:0 4px;font-size:10px}
</style>
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
</head>
<body>
<div id="app">
  <div id="bar">
    <div class="grp">
      <button id="m-move"  class="mode on">⤧ Move/Drag</button>
      <button id="m-addh"  class="mode horiz">＋ ‖ guide</button>
      <button id="m-addo"  class="mode oblique">＋ ╱ guide</button>
      <button id="m-addd"  class="mode diag">＋ ◹ angled</button>
      <button id="m-fill"  class="mode">▰ Fill cell</button>
      <button id="m-erase" class="mode">▱ Erase</button>
      <button id="m-pan"   class="mode">✋ Pan</button>
    </div>
    <div class="grp">
      <label>&#9585; angle&deg;
        <input id="o-ang" type="number" min="5" max="89" step="0.1" value="53.6" style="width:58px">
      </label>
      <input id="o-ang-r" type="range" min="5" max="89" step="0.1" value="53.6">
    </div>
    <div class="grp">
      <label>&#9721; angle&deg;
        <input id="d-ang" type="number" min="-89" max="89" step="0.1" value="53.6" style="width:58px">
      </label>
      <input id="d-ang-r" type="range" min="-89" max="89" step="0.1" value="53.6">
    </div>
    <div class="grp">
      <label>fill <select id="fillpair">
        <option value="h,o">‖ &times; ╱ (Z grid)</option>
        <option value="h,d">‖ &times; ◹ (angled)</option>
        <option value="o,d">╱ &times; ◹ (angled)</option>
      </select></label>
    </div>
    <div class="grp">
      <button id="zoom-in">＋</button>
      <button id="zoom-out">－</button>
      <button id="fitview">Fit</button>
    </div>
    <div class="grp">
      <button id="undo">↶ Undo</button>
      <button id="sub-h">Subdivide ‖</button>
      <button id="sub-o">Subdivide ╱</button>
      <button id="zpreset">⃟ Load Z preset</button>
      <button id="reset">Reset grid</button>
      <button id="clear">Clear fills</button>
    </div>
    <div class="grp">
      <label>image <input id="op" type="range" min="0" max="100" value="55"></label>
      <label><input id="t-nodes" type="checkbox" checked> nodes</label>
      <label><input id="t-trace" type="checkbox" checked> trace</label>
      <label><input id="t-snap"  type="checkbox" checked> snap</label>
    </div>
    <div class="grp">
      <button id="import">⤒ Import SVG</button>
      <label><input id="exp-z" type="checkbox" checked> incl. Z</label>
      <button id="export">⤓ Export SVG</button>
      <input id="file" type="file" accept=".svg,image/svg+xml" style="display:none">
    </div>
    <div class="grp">
      <button id="loadfont">⤒ Font</button>
      <input id="fonttext" type="text" value="Z" placeholder="text" style="width:64px">
      <label>size <input id="fontsize" type="number" min="50" max="3000" value="900" style="width:60px"></label>
      <button id="placefont" disabled>▰ Place as cells</button>
      <input id="fontfile" type="file" accept=".ttf,.otf,.woff" style="display:none">
    </div>
    <div class="grp" id="metricbar">
      <label>asc <input data-m="ascender"   type="number" class="mnum" style="width:54px"></label>
      <label>cap <input data-m="cap"        type="number" class="mnum" style="width:54px"></label>
      <label>x   <input data-m="xHeight"    type="number" class="mnum" style="width:54px"></label>
      <label>base<input data-m="baseline"   type="number" class="mnum" style="width:54px"></label>
      <label>desc<input data-m="descender"  type="number" class="mnum" style="width:54px"></label>
      <label>adv <input data-m="advance"    type="number" class="mnum" style="width:54px"></label>
      <label>sb  <input data-m="sidebearing" type="number" class="mnum" style="width:44px"></label>
    </div>
  </div>

  <div id="panels">
    <div class="panel" data-i="0"></div>
    <div class="panel" data-i="1"></div>
    <div class="panel" data-i="2"></div>
  </div>

  <div id="status">
    <span>oblique slope dx/dy = <b id="slopeK">-0.7375</b> (<b id="slopeA">53.6&deg;</b> from horizontal)</span>
    <span>‖ guides: <b id="nH">0</b></span>
    <span>╱ guides: <b id="nO">0</b></span>
    <span>filled cells: <b id="nF">0</b></span>
    <span>mode: <b id="mname">move</b></span>
    <span>zoom: <b id="zlbl">100%</b></span>
    <span style="color:#666">wheel=zoom &middot; middle/Space/Pan=pan &middot; right-click=delete &middot; shift-click=multi-select &middot; Del=remove selected</span>
  </div>
</div>

<script>
let K = 0.7375;                         // oblique slope: x decreases by K for every +1 in y (= cot(oAngle))
let oAngle = 53.6;                       // oblique angle from horizontal, drives K and rotates the ╱ family
const TRACE = "M346 320 L1023 320 L620.6 865 L1002.3 865 L933 959 L256 959 L658.2 414 L276.7 414 Z";
const Z_PTS = [[346,320],[1023,320],[620.6,865],[1002.3,865],[933,959],[256,959],[658.2,414],[276.7,414]];
// oblique line identity: c = x + K*y  (constant along the 53.6deg direction)
const SEED_H = [320, 414, 865, 959];                 // bar top/bottoms
const SEED_O = [582, 963.3, 1259, 1640.3];           // the four slanted edges of the Z

// Each panel owns its own <svg>/groups/viewBox/pointer state (see Editor() below).
// Guides carry a stable id so cells can stay bound to them across edits.
let nextId = 1;
const mkG = v => ({id:nextId++, v});
let hG = [];                  // horizontal guides {id, v=y}      (blank by default)
let oG = [];                  // oblique guides    {id, v=c}       (blank by default)
let dG = [];                  // angled guides {id, px}: pivots on the Z center line, share dAngle
let dAngle = 53.6;            // degrees from horizontal, shared by all angled guides
let fillPair = ['h','o'];     // which two guide families bound a filled cell
const CX = 639.5, CY = 639.5; // Z center; angled guides pivot/rotate about points on y=CY
// A cell is either guide-bound {h0,h1,o0,o1} (ids) or a free polygon {free:[[x,y]...]}.
// ---- per-glyph cell store ----------------------------------------------------
// Cells are PER-CHARACTER. GLYPHS maps a char -> its record. Guides/angles stay
// global (shared by every panel); only cells/selection are per-glyph/per-panel.
// (split/detached/localGuides are placeholders for later tasks; default here.)
const GLYPHS = new Map();      // char -> { cells:Cell[], split, detached, localGuides }
function glyphOf(ch){
  let g=GLYPHS.get(ch);
  if(!g){ g={cells:[], split:false, detached:false, localGuides:null}; GLYPHS.set(ch,g); }
  return g;
}
const ALPHABET = [...'abcdefghijklmnopqrstuvwxyz0123456789.,!?-'];
let mode = 'move';
let snap = true;

const metrics = {baseline:1040,xHeight:560,cap:240,ascender:160,descender:1140,advance:760,sidebearing:80};
const METRIC_KEYS = ['ascender','cap','xHeight','baseline','descender'];
function syncMetricUI(){ document.querySelectorAll('.mnum').forEach(inp=>inp.value=metrics[inp.dataset.m]); }

const byId = (arr,id)=>arr.find(g=>g.id===id);

// ---- effective guides per glyph -------------------------------------------------
// When a glyph is NOT split, its effective guides ARE the shared globals (byte-for-byte
// identical behaviour). When split, the glyph gains its OWN EXTRA local guides layered
// ON TOP of the still-live shared guides: effective = shared.concat(local-extra).
// When ALSO detached (stop-propagate, Task 6), the live shared arrays are IGNORED and the
// glyph reads off its FROZEN copy (localGuides.base, ids preserved) plus its extras:
// effective = base.concat(local-extra). The combined localGuides shape is
// { hG,oG,dG (EXTRAS), base:{hG,oG,dG}|null (FROZEN shared snapshot) }.
function effGuides(g){
  if(!g||!g.split) return {h:hG, o:oG, d:dG};
  const L=g.localGuides||(g.localGuides={hG:[],oG:[],dG:[],base:null});
  if(g.detached && L.base)
    return { h:L.base.hG.concat(L.hG), o:L.base.oG.concat(L.oG), d:L.base.dG.concat(L.dG) };
  return { h:hG.concat(L.hG), o:oG.concat(L.oG), d:dG.concat(L.dG) };
}
const SHARED_EFF = ()=>({h:hG, o:oG, d:dG});   // the shared-only effective set (split OFF default)

// find the guide object with `id` in family `type` for glyph `g`. Returns the live object
// to mutate so dragging touches whichever array actually holds it.
//   - NOT detached: search the SHARED array first, then the glyph's local-extra array.
//   - DETACHED: the shared arrays are off-limits; search the glyph's FROZEN base copy
//     first, then its local-extra array (so a drag in a detached glyph never touches shared).
function findGuide(g,type,id){
  if(g&&g.split&&g.detached&&g.localGuides&&g.localGuides.base){
    const L=g.localGuides;
    const base = type==='h'?L.base.hG : type==='o'?L.base.oG : L.base.dG;
    let b=byId(base,id); if(b) return b;
    const extra = type==='h'?L.hG : type==='o'?L.oG : L.dG;
    return (extra && byId(extra,id))||null;
  }
  const shared = type==='h'?hG : type==='o'?oG : dG;
  let f=byId(shared,id); if(f) return f;
  if(g&&g.split&&g.localGuides){
    const local = type==='h'?g.localGuides.hG : type==='o'?g.localGuides.oG : g.localGuides.dG;
    if(local) return byId(local,id)||null;
  }
  return null;
}

// add a guide of `type` (value=v for h/o, px for d). While split (attached OR detached),
// the new guide goes into the current glyph's local-EXTRA set — never the shared globals
// and never the frozen base; otherwise into the shared set.
function addGuide(g,type,value){
  if(g&&g.split){
    g.localGuides=g.localGuides||{hG:[],oG:[],dG:[],base:null};
    const arr = type==='h'?g.localGuides.hG : type==='o'?g.localGuides.oG : g.localGuides.dG;
    arr.push(type==='d'?{id:nextId++,px:value}:{id:nextId++,v:value});
  } else {
    const arr = type==='h'?hG : type==='o'?oG : dG;
    arr.push(type==='d'?{id:nextId++,px:value}:{id:nextId++,v:value});
  }
}

// Guide families. Each parallel family exposes a guide's scalar value, the value of an
// arbitrary point, and the infinite line (point + direction) of a guide. `arr()` returns
// the SHARED globals; guide READS for a glyph go through an explicit effective set (eff.h/
// eff.o/eff.d) instead, so split glyphs see shared∪local.
const FAM = {
  h:{ arr:()=>hG, val:g=>g.v,  coord:p=>p.y,            line:g=>({p:[0,g.v],  d:[1,0]}) },
  o:{ arr:()=>oG, val:g=>g.v,  coord:p=>p.x+K*p.y,      line:g=>({p:[g.v,0],  d:[-K,1]}) },
  d:{ arr:()=>dG, val:g=>g.px, coord:p=>{ const a=dAngle*Math.PI/180; return p.x+(p.y-CY)*Math.cos(a)/Math.sin(a); },
      line:g=>{ const a=dAngle*Math.PI/180; return {p:[g.px,CY], d:[Math.cos(a),-Math.sin(a)]}; } },
};
// pick the effective array for a family from an eff set ({h,o,d}); defaults to shared.
function effArr(eff,fam){ const e=eff||SHARED_EFF(); return fam==='h'?e.h : fam==='o'?e.o : e.d; }
function intersect(L1,L2){
  const [x1,y1]=L1.p,[dx1,dy1]=L1.d,[x2,y2]=L2.p,[dx2,dy2]=L2.d;
  const den=dx1*dy2-dy1*dx2; if(Math.abs(den)<1e-9) return null;       // parallel families
  const t=((x2-x1)*dy2-(y2-y1)*dx2)/den;
  return [x1+t*dx1, y1+t*dy1];
}
// corners of a cell, computed live from its two bounding guide-pairs (null if orphaned).
// `eff` is the glyph's effective guide set ({h,o,d}); defaults to the shared globals so
// callers that pass nothing behave exactly as before. byId searches the effective array
// so a cell bound to either a shared or a local guide id resolves.
function corners(cell,eff){
  if(cell.free) return cell.free;
  const A=FAM[cell.fa], B=FAM[cell.fb];
  const Aa=effArr(eff,cell.fa), Bb=effArr(eff,cell.fb);
  const a0=byId(Aa,cell.ga0), a1=byId(Aa,cell.ga1),
        b0=byId(Bb,cell.gb0), b1=byId(Bb,cell.gb1);
  if(!a0||!a1||!b0||!b1) return null;
  const La0=A.line(a0),La1=A.line(a1),Lb0=B.line(b0),Lb1=B.line(b1);
  const q=[intersect(La0,Lb0),intersect(La1,Lb0),intersect(La1,Lb1),intersect(La0,Lb1)];
  return q.some(p=>!p)?null:q;
}

// ---- undo history (global: covers shared guides/angles AND every glyph's cells) ----
let history=[];
function snapshot(){
  const glyphs={};
  for(const [c,g] of GLYPHS) glyphs[c]=JSON.parse(JSON.stringify(g));
  return { hG:JSON.parse(JSON.stringify(hG)), oG:JSON.parse(JSON.stringify(oG)),
           dG:JSON.parse(JSON.stringify(dG)), dAngle, K, oAngle, nextId, glyphs,
           metrics:JSON.parse(JSON.stringify(metrics)) };
}
function pushHistory(){ history.push(snapshot()); if(history.length>200) history.shift(); }
function undo(){
  if(!history.length) return;
  const s=history.pop();
  hG=s.hG; oG=s.oG; dG=s.dG; dAngle=s.dAngle; K=s.K; oAngle=s.oAngle; nextId=s.nextId;
  if(s.metrics) Object.assign(metrics, s.metrics);
  GLYPHS.clear(); for(const c in s.glyphs) GLYPHS.set(c, s.glyphs[c]);
  for(const e of editors) e.clearSelection();
  syncAngleUI(); syncObliqueUI(); updateSlope(); syncMetricUI(); renderAll(); scheduleSave();
}

const SNAP = 8;               // px snap radius to nice grid
function snapY(y){ if(!snap) return y; let r=Math.round(y/16)*16; return Math.abs(r-y)<SNAP?r:y; }
function snapC(c){ if(!snap) return c; let r=Math.round(c/16)*16; return Math.abs(r-c)<SNAP?r:c; }
function snapX(x){ if(!snap) return x; if(Math.abs(x-CX)<SNAP) return CX; let r=Math.round(x/16)*16; return Math.abs(r-x)<SNAP?r:x; }

// ---- coordinate helpers (shared math; per-surface toSVG lives in Editor) ----
const cval = (x,y)=> x + K*y;            // oblique coordinate of a point
const xOf  = (c,y)=> c - K*y;            // x on oblique line c at height y

// Space-to-pan is a keyboard-global flag shared by every panel.
let spaceDown=false;

// ---- small DOM helpers (pure; shared) ----
function clear(el){ while(el.firstChild) el.removeChild(el.firstChild); }
function svgEl(n,attrs){ const e=document.createElementNS('http://www.w3.org/2000/svg',n);
  for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

// a cell renders as one or more rings: guide-bound/simple cells have one (from corners),
// glyph & holed cells carry several in .rings. Null => orphaned (drop it).
function cellRings(cell,eff){
  if(cell.rings) return cell.rings.every(r=>r&&r.length>=3) ? cell.rings : null;
  const c=corners(cell,eff); return c?[c]:null;
}
const ringPath=r=>'M'+r.map(p=>p.map(n=>+n.toFixed(2)).join(' ')).join(' L ')+' Z';

// delete a guide, then refresh every panel. `g` is the panel's active glyph (so a delete
// inside a DETACHED glyph is scoped to its private base/extra copies and never touches the
// shared globals — even though base ids collide with shared ids). For a non-detached glyph
// the id is removed from the SHARED set if it lives there; otherwise (a split glyph's
// local-extra guide) it is removed from whichever glyph's local set holds it. Removing a
// shared guide can orphan cells in several glyphs; each panel's render() prunes its OWN
// glyph's orphans and clears only its OWN selection.
function delGuide(type,id,g){
  pushHistory();
  // DETACHED glyph: confine the delete to this glyph's frozen base + local-extra arrays.
  if(g&&g.split&&g.detached&&g.localGuides&&g.localGuides.base){
    const L=g.localGuides;
    const base = type==='h'?L.base.hG : type==='o'?L.base.oG : L.base.dG;
    const extra = type==='h'?L.hG : type==='o'?L.oG : L.dG;
    let k=base.findIndex(x=>x.id===id);
    if(k>=0) base.splice(k,1);
    else { k=extra.findIndex(x=>x.id===id); if(k>=0) extra.splice(k,1); }
    renderAll(); scheduleSave(); return;
  }
  const sharedArr = type==='h'?hG : type==='o'?oG : dG;
  if(byId(sharedArr,id)){
    if(type==='h') hG=hG.filter(g=>g.id!==id);
    else if(type==='o') oG=oG.filter(g=>g.id!==id);
    else dG=dG.filter(g=>g.id!==id);
  } else {
    // not shared: find and splice from the local-extra set that owns it
    for(const g of GLYPHS.values()){
      if(!g.split||!g.localGuides) continue;
      const local = type==='h'?g.localGuides.hG : type==='o'?g.localGuides.oG : g.localGuides.dG;
      const k=local.findIndex(x=>x.id===id);
      if(k>=0){ local.splice(k,1); break; }
    }
  }
  renderAll(); scheduleSave();
}

// ============================================================================
//  Editor: one panel. Owns its <svg>, viewBox (independent pan/zoom) and
//  pointer/drag state. Guides/angles/mode/snap are SHARED globals, but the
//  cells it edits are PER-CHARACTER: the panel edits one glyph (its `ch`),
//  reached via cells()=glyphOf(ch).cells, and owns a closure-local `selected`
//  set (selection is per-panel). Instantiated once per .panel host below.
// ============================================================================
function Editor(host){
  const i = +host.dataset.i;
  let ch = ALPHABET[i] || ALPHABET[0];   // which char this panel edits (0->'a',1->'b',2->'c')
  function cells(){ return glyphOf(ch).cells; }       // this panel's live cell array
  function setCells(arr){ glyphOf(ch).cells = arr; }  // replace it (filter/freeze/clear)
  let selected = new Set();               // indices into cells() (per-panel selection)
  host.innerHTML =
    '<div class="phead"><span class="plabel">panel '+(i+1)+'</span>'+
    '<span style="flex:1"></span>'+
    '<button class="zin">＋</button><button class="zout">－</button><button class="zfit">Fit</button></div>'+
    '<div class="pbody"></div>';
  // per-panel letter dropdown: pick which glyph this panel edits
  const letterSel = document.createElement('select'); letterSel.className='letter';
  for(const c of ALPHABET){ const o=document.createElement('option'); o.value=c; o.textContent=c; letterSel.appendChild(o); }
  letterSel.value = ch;
  letterSel.addEventListener('change', ()=>{ ch=letterSel.value; selected.clear(); render(); scheduleSave(); syncSplitUI(); });
  host.querySelector('.phead').insertBefore(letterSel, host.querySelector('.zin'));
  // per-panel Split toggle: turns ON this glyph's EXTRA local guides (layered on shared).
  // detachBtn (built just below) is the stop-propagate sub-toggle; only meaningful when split.
  let detachBtn=null;
  const splitBtn=document.createElement('button'); splitBtn.className='split'; splitBtn.textContent='⑃ split';
  splitBtn.addEventListener('click',()=>{
    pushHistory(); const g=glyphOf(ch);

    render(); scheduleSave();
  });
  host.querySelector('.phead').insertBefore(splitBtn, host.querySelector('.zin'));
  // per-panel stop-propagate (detach) sub-toggle: freezes a private, id-stable copy of the
  // shared guides into localGuides.base so this glyph stops receiving shared-guide edits.
  detachBtn=document.createElement('button'); detachBtn.className='detach'; detachBtn.textContent='⛔ stop sync';
  detachBtn.style.display='none';
  detachBtn.addEventListener('click',()=>{
    const g=glyphOf(ch); if(!g.split) return; pushHistory();

      g.localGuides=g.localGuides||{hG:[],oG:[],dG:[],base:null};

                           oG:JSON.parse(JSON.stringify(oG)),

  });
  host.querySelector('.phead').insertBefore(detachBtn, host.querySelector('.zin'));
  // reflect the current glyph's split + detached state on the toggles (after letter change/load)
  function syncSplitUI(){

  const body = host.querySelector('.pbody');

    '<rect x="-200000" y="-200000" width="400000" height="400000" fill="#000"/>'+
    '<image class="under" x="0" y="0" width="1280" height="1280" opacity="0.55" style="display:none"/>'+
    '<g class="gfills"></g>'+
    '<path class="trace" d="'+TRACE+'" style="display:none"/>'+

  body.appendChild(svg);

  const gFills  = svg.querySelector('.gfills');
  const gTrace  = svg.querySelector('.trace');
  const gGuides = svg.querySelector('.gguides');
  const gNodes  = svg.querySelector('.gnodes');
  let vb = {x:0,y:0,w:1280,h:1280};
  let drag=null, pan=null;

  function applyVB(){
    svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
    if(i===_active) document.getElementById('zlbl').textContent = Math.round(1280/vb.w*100)+'%';
  }
  function toSVG(evt){ const p=svg.createSVGPoint(); p.x=evt.clientX; p.y=evt.clientY;
    return p.matrixTransform(svg.getScreenCTM().inverse()); }

  // ---- view: pan + zoom via this panel's viewBox (independent of other panels) ----
  function zoomAt(mx,my,f){            // mx,my in 0..1 of svg box
    const cx=vb.x+mx*vb.w, cy=vb.y+my*vb.h;
    let nw=Math.max(60,Math.min(40000,vb.w*f));
    let nh=Math.max(60,Math.min(40000,vb.h*f));
    vb.w=nw; vb.h=nh; vb.x=cx-mx*vb.w; vb.y=cy-my*vb.h; applyVB();
  }
  svg.addEventListener('wheel',(e)=>{
    e.preventDefault();

    zoomAt((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height, e.deltaY<0?0.85:1/0.85);
  },{passive:false});
  function startPan(e){
    const r=svg.getBoundingClientRect();
    pan={sx:e.clientX,sy:e.clientY,vx:vb.x,vy:vb.y,rw:r.width,rh:r.height};
    svg.setPointerCapture(e.pointerId); svg.style.cursor='grabbing';
    svg.addEventListener('pointermove',onPan); svg.addEventListener('pointerup',endPan);
  }
  function onPan(e){

  function endPan(){ pan=null; svg.style.cursor = mode==='pan'?'grab':'';
    svg.removeEventListener('pointermove',onPan); svg.removeEventListener('pointerup',endPan); }

  // ---- rendering this panel from the shared state ----
  function guideEl(type,id,x1,y1,x2,y2){
    const g = svgEl('g',{});
    const hit = svgEl('line',{x1,y1,x2,y2,class:'gline-hit'});
    const cls = type==='h'?'gline-h':type==='o'?'gline-o':'gline-d';
    const vis = svgEl('line',{x1,y1,x2,y2,class:cls});
    hit.dataset.type=type; hit.dataset.id=id;
    hit.addEventListener('pointerdown', startDrag);
    hit.addEventListener('dblclick', ()=>delGuide(type,id,glyphOf(ch)));
    g.appendChild(hit); g.appendChild(vis); return g;
  }
  function render(){
    // effective guides for THIS panel's glyph: shared when not split, shared∪local when split.
    const EFF = effGuides(glyphOf(ch));
    // underlay + trace reflect shared preset/UI state (per-panel image, same source)
    gUnder.style.display = _underHref ? '' : 'none';
    if(_underHref){
      gUnder.setAttribute('href',_underHref);
      gUnder.setAttributeNS('http://www.w3.org/1999/xlink','href',_underHref);
      gUnder.setAttribute('opacity', document.getElementById('op').value/100);
    }
    gTrace.style.display = _traceOn ? '' : 'none';
    // cells: prune THIS glyph's orphans (a deleted shared guide can orphan them) and
    // clear only THIS panel's selection if any were dropped. Operates strictly on the
    // current glyph + this closure's `selected` so no other panel/glyph is touched.
    const list=cells(), before=list.length;
    const kept=list.filter(c=>cellRings(c,EFF)!==null);
    if(kept.length!==before){ setCells(kept); selected.clear(); }
    const cs=cells();
    clear(gFills);
    for(let j=0;j<cs.length;j++){
      const d=cellRings(cs[j],EFF).map(ringPath).join(' ');   // evenodd => counters/holes punch through
      gFills.appendChild(svgEl('path',{d,'fill-rule':'evenodd',class:'cell'+(selected.has(j)?' sel':'')}));
    }
    // guides (draw the effective set: shared + any local-extra of a split glyph)
    clear(gGuides);
    const R=200000;
    EFF.h.forEach(g=> gGuides.appendChild(guideEl('h',g.id, -R,g.v, R,g.v)));
    EFF.o.forEach(g=> gGuides.appendChild(guideEl('o',g.id, xOf(g.v,-R),-R, xOf(g.v,R),R)));
    if(EFF.d.length){
      gGuides.appendChild(svgEl('line',{x1:-R,y1:CY,x2:R,y2:CY,class:'axis'})); // center line
      const a=dAngle*Math.PI/180, cs=Math.cos(a), sn=Math.sin(a);              // dir = (cos, -sin)
      EFF.d.forEach(g=>{
        gGuides.appendChild(guideEl('d',g.id, g.px-R*cs, CY+R*sn, g.px+R*cs, CY-R*sn));
        gGuides.appendChild(svgEl('circle',{cx:g.px,cy:CY,r:6,class:'dpivot'}));
      });
    }
    // metric lines (global; rendered in every panel)
    for(const key of METRIC_KEYS){
      const y=metrics[key];
      const hit=svgEl('line',{x1:-R,y1:y,x2:R,y2:y,class:'mline-hit'});
      hit.dataset.metric=key; hit.addEventListener('pointerdown',startMetricDrag);
      gGuides.appendChild(hit);
      gGuides.appendChild(svgEl('line',{x1:-R,y1:y,x2:R,y2:y,class:'mline'}));
      gGuides.appendChild(svgEl('text',{x:vb.x+8,y:y-4,class:'mlabel-t'})).textContent=key;
    }
    // nodes (intersections of this glyph's effective ‖ × ╱ guides)
    clear(gNodes);
    if(document.getElementById('t-nodes').checked){
      for(const a of EFF.h) for(const b of EFF.o)
        gNodes.appendChild(svgEl('circle',{cx:xOf(b.v,a.v),cy:a.v,r:5,class:'node'}));
    }
    // status counters: reflect the ACTIVE panel's effective set (split shows shared+local).
    if(i===_active){
      document.getElementById('nH').textContent = EFF.h.length;
      document.getElementById('nO').textContent = EFF.o.length;
      document.getElementById('nF').textContent = cells().length;
    }
  }

  // ---- dragging guides (mutates shared guides -> renderAll so all panels track) ----
  function startDrag(e){
    if(e.button!==0 || spaceDown || mode!=='move') return; // let pan / other modes fall through
    e.stopPropagation();
    pushHistory();
    drag={type:e.target.dataset.type, id:+e.target.dataset.id};
    svg.setPointerCapture(e.pointerId);
    svg.addEventListener('pointermove',onDrag);
    svg.addEventListener('pointerup',endDrag);
  }
  function onDrag(e){
    if(!drag) return;
    const p=toSVG(e), gl=glyphOf(ch);
    // mutate whichever array (shared or this glyph's local-extra) actually holds the id.
    if(drag.type==='d'){ const g=findGuide(gl,'d',drag.id); if(g) g.px=snapX(p.x); }
    else { const g=findGuide(gl,drag.type,drag.id);
      if(g) g.v = drag.type==='h' ? snapY(p.y) : snapC(cval(p.x,p.y)); }
    renderAll();
  }
  function endDrag(){
    if(!drag) return;
    drag=null;
    svg.removeEventListener('pointermove',onDrag);
    svg.removeEventListener('pointerup',endDrag);
    renderAll(); scheduleSave();
  }

  // ---- dragging metric lines (mutates GLOBAL metrics object -> renderAll) ----
  let mdrag=null;
  function startMetricDrag(e){
    if(e.button!==0 || mode!=='move') return;
    e.stopPropagation(); pushHistory();
    mdrag=e.target.dataset.metric;
    svg.setPointerCapture(e.pointerId);
    svg.addEventListener('pointermove',onMetricDrag);
    svg.addEventListener('pointerup',endMetricDrag);
  }
  function onMetricDrag(e){ if(!mdrag) return; metrics[mdrag]=Math.round(toSVG(e).y); syncMetricUI(); renderAll(); }
  function endMetricDrag(){ if(!mdrag) return; mdrag=null;
    svg.removeEventListener('pointermove',onMetricDrag); svg.removeEventListener('pointerup',endMetricDrag); scheduleSave(); }

  // ---- canvas clicks (add / fill / erase / select) ----
  svg.addEventListener('pointerdown',(e)=>{
    if(e.button===2) return;                                              // right-click = delete (handled below)
    if(e.button===1 || spaceDown || mode==='pan'){ startPan(e); return; } // pan
    if(e.target.classList.contains('gline-hit') && mode==='move') return; // guide drag handles it
    if(e.target.classList.contains('mline-hit') && mode==='move') return; // metric drag handles it
    const p=toSVG(e);
    // while split, new guides go to THIS glyph's local-extra set; else to the shared set.
    if(mode==='addh'){ pushHistory(); addGuide(glyphOf(ch),'h',snapY(p.y)); renderAll(); scheduleSave(); }
    else if(mode==='addo'){ pushHistory(); addGuide(glyphOf(ch),'o',snapC(cval(p.x,p.y))); renderAll(); scheduleSave(); }
    else if(mode==='addd'){ pushHistory(); addGuide(glyphOf(ch),'d',snapX(p.x)); renderAll(); scheduleSave(); }
    else if(mode==='fill'){ toggleCell(p); }
    else if(mode==='erase'){ eraseAt(p); }
    else if(mode==='move'){ selectAt(p, e.shiftKey); }
  });

  svg.addEventListener('contextmenu',(e)=>{
    e.preventDefault();

      delGuide(e.target.dataset.type, +e.target.dataset.id, glyphOf(ch)); return;
    }
    const j=cellAt(toSVG(e));
    if(j>=0){ pushHistory(); cells().splice(j,1); selected.clear(); renderAll(); scheduleSave(); }
  });

  // ---- per-glyph cell ops (operate on THIS panel's glyph + this panel's selection) ----
  function cellAt(p){
    const cs=cells(), EFF=effGuides(glyphOf(ch));
    for(let k=cs.length-1;k>=0;k--){ const r=cellRings(cs[k],EFF); if(r&&inCell([p.x,p.y],r)) return k; }
    return -1;
  }
  function toggleCell(p){
    const EFF=effGuides(glyphOf(ch));
    const [fa,fb]=fillPair;
    const ba=bracketF(fa,p,EFF), bb=bracketF(fb,p,EFF);
    if(!ba||!bb) return;

    if(!corners(cell,EFF)) return;                             // families parallel here -> no cell
    pushHistory();
    const cs=cells();
    const idx=cs.findIndex(c=>sameCell(c,cell));
    if(idx>=0) cs.splice(idx,1); else cs.push(cell);
    renderAll(); scheduleSave();
  }
  function eraseAt(p){
    const k=cellAt(p); if(k>=0){ pushHistory(); cells().splice(k,1); selected.clear(); scheduleSave(); }
    renderAll();
  }
  function selectAt(p, additive){
    const k=cellAt(p);
    if(k<0){ if(!additive && selected.size){ selected.clear(); renderAll(); } return; }
    if(additive){ selected.has(k)?selected.delete(k):selected.add(k); }
    else { selected = new Set([k]); }

  }
  // delete the current selection (Del key); returns true if anything was removed
  function deleteSelected(){
    if(!selected.size) return false;
    pushHistory();
    const cs=cells();
    [...selected].sort((a,b)=>b-a).forEach(k=>cs.splice(k,1));
    selected.clear(); renderAll(); scheduleSave(); return true;
  }
  function clearSelection(){ if(selected.size){ selected.clear(); renderAll(); } }

  // pointer entering this panel makes it the active one (drives click-math source)
  host.addEventListener('pointerenter', ()=>setActive(i));
  // per-panel zoom buttons
  host.querySelector('.zin').onclick  = ()=>zoomAt(0.5,0.5,0.8);
  host.querySelector('.zout').onclick = ()=>zoomAt(0.5,0.5,1/0.8);
  host.querySelector('.zfit').onclick = fitView;

  function fitView(){ vb={x:0,y:0,w:1280,h:1280}; applyVB(); }
  function setCursor(c){ svg.style.cursor = c; }

  return { el:host, id:i, render, fitView, applyVB, zoomTo:zoomAt, setCursor, _svg:svg,
           get ch(){return ch}, cells, setCells, deleteSelected, clearSelection };
}

// bracket a point within a family -> [loGuide, hiGuide] (the two guides it sits between).
// `eff` is the glyph's effective guide set; defaults to shared globals (split OFF identical).
function bracketF(fam,p,eff){
  const F=FAM[fam], v=F.coord(p); let lo=null,hi=null;
  for(const g of effArr(eff,fam)){ const gv=F.val(g);
    if(gv<=v && (!lo||F.val(lo)<gv)) lo=g;
    if(gv>=v && (!hi||F.val(hi)>gv)) hi=g; }
  return (lo&&hi&&lo!==hi)?[lo,hi]:null;
}
function inCell(pt,rings){ let c=false; for(const r of rings) if(inPoly(pt,r)) c=!c; return c; }  // evenodd
function cellKey(c){
  if(c.free) return 'free';
  const A=[c.fa,...[c.ga0,c.ga1].sort((x,y)=>x-y)].join(':');
  const B=[c.fb,...[c.gb0,c.gb1].sort((x,y)=>x-y)].join(':');
  return [A,B].sort().join('|');
}
const sameCell=(a,b)=>!a.free&&!b.free&&cellKey(a)===cellKey(b);
// cellAt/toggleCell/eraseAt/selectAt now live INSIDE Editor (they read this panel's
// glyph via cells() and mutate this panel's closure-local `selected`).
function inPoly(pt,poly){
  let c=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>pt[1])!=(yj>pt[1])) && (pt[0]<(xj-xi)*(pt[1]-yi)/(yj-yi)+xi)) c=!c;
  } return c;
}

// ---- subdivide: insert midpoint guides between adjacent ones ----
function subdiv(arr){
  const s=[...arr].sort((a,b)=>a.v-b.v);
  for(let i=0;i<s.length-1;i++) arr.push(mkG((s[i].v+s[i+1].v)/2));
}
// freeze guide-bound cells into free polygons (so they survive a grid reset); ring cells pass through.
// Reset wipes the SHARED guides, which would orphan EVERY glyph's bound cells, so freeze them all.
function freezeCellList(arr,eff){ return arr.map(c=> c.rings?c : (corners(c,eff)?{free:corners(c,eff)}:null)).filter(Boolean); }
function freezeCells(){ for(const g of GLYPHS.values()) g.cells = freezeCellList(g.cells, effGuides(g)); }

function bboxOf(polys){
  let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity;
  for(const p of polys) for(const [x,y] of p){ a=Math.min(a,x);b=Math.min(b,y);c=Math.max(c,x);d=Math.max(d,y); }
  return {minx:a,miny:b,maxx:c,maxy:d};
}
const ptsStr=(pts)=>pts.map(p=>p.map(n=>+n.toFixed(1)).join(',')).join(' ');

// ---- merge: union edge-adjacent cells into one outline each ----
// Cells that share an exact edge are fused. We orient every cell the same way,
// cancel any directed edge that also appears reversed (a shared interior edge),
// then stitch the survivors into closed loops. Outer rings and holes come out
// oppositely wound, so SVG's default nonzero fill-rule renders holes for free.
const Q=1e3;                                            // quantize verts to 0.001 for exact matching
const qkey=(p)=>Math.round(p[0]*Q)+','+Math.round(p[1]*Q);
function signedArea(poly){ let a=0; for(let i=0,n=poly.length;i<n;i++){ const [x1,y1]=poly[i],[x2,y2]=poly[(i+1)%n]; a+=x1*y2-x2*y1; } return a; }
const norm=(poly)=> signedArea(poly)<0 ? poly.slice().reverse() : poly;   // force one consistent winding
function turn(din,dout){                                 // signed left-turn angle from din to dout
  return Math.atan2(din[0]*dout[1]-din[1]*dout[0], din[0]*dout[0]+din[1]*dout[1]); }

// group cell indices that share an edge (union-find over undirected edge keys)
function groupByEdge(polys){
  const parent=polys.map((_,i)=>i);
  const find=x=>{ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; };
  const owner=new Map();
  polys.forEach((poly,i)=>{ for(let k=0,n=poly.length;k<n;k++){
    const a=qkey(poly[k]), b=qkey(poly[(k+1)%n]); const ek=a<b?a+'|'+b:b+'|'+a;
    if(owner.has(ek)) parent[find(i)]=find(owner.get(ek)); else owner.set(ek,i); } });
  const groups=new Map();
  polys.forEach((_,i)=>{ const r=find(i); if(!groups.has(r)) groups.set(r,[]); groups.get(r).push(i); });
  return [...groups.values()];
}
// boundary loops of a set of (consistently wound) cells
function groupLoops(cells){
  const edges=[]; const emap=new Map();                 // surviving directed edges + lookup
  const addEdge=(a,b)=>{ const ka=qkey(a),kb=qkey(b), rev=kb+'>'+ka;
    if(emap.has(rev)){ edges[emap.get(rev)]=null; emap.delete(rev); }     // interior edge: cancel
    else { emap.set(ka+'>'+kb, edges.length); edges.push([a,b]); } };
  for(const poly of cells) for(let k=0,n=poly.length;k<n;k++) addEdge(poly[k],poly[(k+1)%n]);
  const out=new Map();                                  // start-vertex key -> outgoing edge indices
  edges.forEach((e,i)=>{ if(!e) return; const ka=qkey(e[0]); if(!out.has(ka)) out.set(ka,[]); out.get(ka).push(i); });
  const used=new Array(edges.length).fill(false), loops=[];
  for(let i=0;i<edges.length;i++){
    if(!edges[i]||used[i]) continue;
    const loop=[]; let ei=i;
    while(ei!=null && !used[ei]){
      used[ei]=true; const [a,b]=edges[ei]; loop.push(a);
      const cand=(out.get(qkey(b))||[]).filter(j=>!used[j]&&edges[j]);
      if(!cand.length){ ei=null; break; }
      if(cand.length===1){ ei=cand[0]; continue; }
      const din=[b[0]-a[0], b[1]-a[1]]; let best=cand[0], bt=Infinity;  // junction: turn most clockwise
      for(const j of cand){ const [c,d]=edges[j], t=turn(din,[d[0]-c[0],d[1]-c[1]]); if(t<bt){ bt=t; best=j; } }
      ei=best;
    }
    if(loop.length>=3) loops.push(loop);
  }
  return loops;
}
function loopPath(lp){ let d='M'+lp[0][0].toFixed(1)+' '+lp[0][1].toFixed(1);
  for(let i=1;i<lp.length;i++) d+=' L'+lp[i][0].toFixed(1)+' '+lp[i][1].toFixed(1); return d+' Z'; }
// returns one path-data string per connected group of edge-sharing cells
function mergedPaths(polys){
  const norms=polys.map(norm);
  return groupByEdge(norms).map(idxs=>groupLoops(idxs.map(i=>norms[i])).map(loopPath).join(' ')).filter(Boolean);
}

document.getElementById('export').onclick=()=>{
  const includeZ=document.getElementById('exp-z').checked;
  // simple single-ring cells get edge-merged; multi-ring (glyph/holed) cells stay their own evenodd shape
  const simple=[], compound=[];
  const EFF=effGuides(glyphOf(activeChar()));                            // resolve against active glyph's effective set
  for(const c of activeCells()){ const r=cellRings(c,EFF); if(!r) continue;   // export the active panel's glyph
    if(r.length>1) compound.push(r); else simple.push(r[0]); }
  const allPolys=simple.concat(compound.flat(), includeZ?[Z_PTS]:[]);
  if(!allPolys.length){ alert('Nothing to export — fill some cells first (or enable “incl. Z”).'); return; }
  const PAD=40, bb=bboxOf(allPolys);
  const x=bb.minx-PAD, y=bb.miny-PAD, w=(bb.maxx-bb.minx)+2*PAD, h=(bb.maxy-bb.miny)+2*PAD;
  let s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${x.toFixed(1)} ${y.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}" width="${Math.round(w)}" height="${Math.round(h)}">\n`;
  s+=`  <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="#000"/>\n`;
  if(includeZ) s+=`  <polygon fill="#fff" points="${ptsStr(Z_PTS)}"/>\n`;
  for(const d of mergedPaths(simple)) s+=`  <path fill="#fff" d="${d}"/>\n`;          // edge-adjacent cells fused
  for(const r of compound) s+=`  <path fill="#fff" fill-rule="evenodd" d="${r.map(loopPath).join(' ')}"/>\n`;
  s+=`</svg>\n`;
  const blob=new Blob([s],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='z-ai-wordmark.svg';a.click();
  URL.revokeObjectURL(a.href);
};

// ---- import: re-derive the guideline relationship from imported geometry ----
// Each <polygon>/<polyline>/<path> ring becomes a cell. Every edge is classified
// into the ‖ / ╱ / ◹ family it runs parallel to, and a matching guide is snapped
// in (deduped), so the import sits on real guides. Clean quads bind to those
// guides (reshape live); everything else stays a free polygon on the new guides.
function pathToRings(d){
  if(!d) return [];
  const toks=d.match(/[a-zA-Z]|[-+]?\d*\.?\d+(?:e[-+]?\d+)?/gi)||[];
  const rings=[]; let ring=[], cx=0,cy=0,sx=0,sy=0, cmd=''; let i=0;
  const num=()=>parseFloat(toks[i++]);
  const need={M:2,L:2,H:1,V:1,C:6,S:4,Q:4,T:2,A:7,Z:0};
  while(i<toks.length){
    if(/[a-zA-Z]/.test(toks[i])) cmd=toks[i++];
    const C=cmd.toUpperCase(), rel=cmd!==C;
    if(C==='Z'){ if(ring.length) rings.push(ring); ring=[]; cx=sx; cy=sy; continue; }
    if(need[C]===undefined){ i++; continue; }
    let nx=cx, ny=cy;
    if(C==='M'||C==='L'){ nx=num(); ny=num(); }
    else if(C==='H'){ nx=num(); }
    else if(C==='V'){ ny=num(); }
    else { for(let k=0;k<need[C]-2;k++) num(); nx=num(); ny=num(); }  // curves: keep endpoint only
    if(rel){ nx+=cx; ny+=cy; }
    cx=nx; cy=ny;
    if(C==='M'){ if(ring.length){ rings.push(ring); ring=[]; } sx=cx; sy=cy; cmd=rel?'l':'L'; }
    ring.push([cx,cy]);
  }
  if(ring.length) rings.push(ring);
  return rings;
}
const GTOL=2.5;                                                   // px tolerance for guide snap/dedupe
const famVal={ h:m=>m[1], o:m=>m[0]+K*m[1],
  d:m=>{ const a=dAngle*Math.PI/180; return m[0]+(m[1]-CY)*Math.cos(a)/Math.sin(a); } };
function famOfEdge(a,b){                                          // which family is this edge parallel to?
  const ex=b[0]-a[0], ey=b[1]-a[1], L=Math.hypot(ex,ey); if(L<1e-6) return null;
  const u=[ex/L,ey/L], a2=dAngle*Math.PI/180, on=Math.hypot(-K,1);
  const fams=[['h',[1,0]],['o',[-K/on,1/on]],['d',[Math.cos(a2),-Math.sin(a2)]]];
  let best=null,bc=Math.sin(4*Math.PI/180);                       // 4° angular tolerance
  for(const [f,d] of fams){ const c=Math.abs(u[0]*d[1]-u[1]*d[0]); if(c<bc){ bc=c; best=f; } }
  return best;
}
function getGuide(f,val){                                         // existing guide near val, else create
  const arr=f==='h'?hG:f==='o'?oG:dG;
  let g=arr.find(g=>Math.abs((f==='d'?g.px:g.v)-val)<GTOL);
  if(!g){ g=f==='d'?{id:nextId++,px:val}:mkG(val); arr.push(g); }
  return g;
}
function deriveGuides(ring){                                     // snap-create guides along a ring's edges
  const n=ring.length, perFam={};
  for(let i=0;i<n;i++){
    const a=ring[i], b=ring[(i+1)%n], f=famOfEdge(a,b); if(!f) continue;
    const m=[(a[0]+b[0])/2,(a[1]+b[1])/2], g=getGuide(f,famVal[f](m));
    (perFam[f]=perFam[f]||new Set()).add(g.id);
  }
  return perFam;
}
function bindQuad(ring,perFam,eff){                              // clean 4-edge ring -> guide-bound cell
  if(ring.length!==4) return null;
  const fams=Object.keys(perFam).filter(f=>perFam[f].size===2);
  if(fams.length!==2) return null;
  const [fa,fb]=fams, A=[...perFam[fa]], B=[...perFam[fb]];
  const cell={fa,ga0:A[0],ga1:A[1],fb,gb0:B[0],gb1:B[1]};
  return corners(cell,eff)?cell:null;
}
// one source element -> one cell; its rings derive guides, multi-ring elements keep holes (evenodd)
function elementToCell(rings,eff){
  const perFam=deriveGuides(rings[0]); for(let i=1;i<rings.length;i++) deriveGuides(rings[i]);
  if(rings.length>1) return {rings, glyph:false};
  return bindQuad(rings[0],perFam,eff) || {free:rings[0]};
}
function importSVG(text){
  const doc=new DOMParser().parseFromString(text,'image/svg+xml');
  const groups=[];
  doc.querySelectorAll('polygon,polyline').forEach(pl=>{
    const raw=(pl.getAttribute('points')||'').trim().split(/[\s,]+/).map(Number).filter(n=>!isNaN(n));
    const pts=[]; for(let i=0;i+1<raw.length;i+=2) pts.push([raw[i],raw[i+1]]);
    if(pts.length>=3) groups.push([pts]);
  });
  doc.querySelectorAll('path').forEach(p=>{ const rs=pathToRings(p.getAttribute('d')).filter(r=>r.length>=3); if(rs.length) groups.push(rs); });
  if(!groups.length){ alert('No <polygon>, <polyline> or <path> geometry found in that SVG.'); return; }
  pushHistory();
  const cs=activeCells();                                  // import into the active panel's glyph
  const EFF=effGuides(glyphOf(activeChar()));              // resolve binds against active glyph's effective set
  for(const rings of groups) cs.push(elementToCell(rings,EFF));
  activeEditor().clearSelection(); renderAll(); scheduleSave();
}
const fileIn=document.getElementById('file');
document.getElementById('import').onclick=()=>fileIn.click();
fileIn.onchange=()=>{ const f=fileIn.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ importSVG(r.result); fileIn.value=''; }; r.readAsText(f); };

// ---- font -> cells: load any (ideally angular) font and drop its glyph outlines in as cells ----
// Each glyph becomes one cell carrying all its contours (evenodd), so counters/holes punch through.
let loadedFont=null;
const lerp=(a,b,t)=>a+(b-a)*t;
function bez(pts,t){ while(pts.length>1){ const n=[]; for(let i=0;i<pts.length-1;i++) n.push([lerp(pts[i][0],pts[i+1][0],t),lerp(pts[i][1],pts[i+1][1],t)]); pts=n; } return pts[0]; }
function cmdsToRings(cmds, steps=8){
  const rings=[]; let ring=[], cx=0,cy=0;
  for(const c of cmds){
    if(c.type==='M'){ if(ring.length>=3) rings.push(ring); ring=[[c.x,c.y]]; cx=c.x; cy=c.y; }
    else if(c.type==='L'){ ring.push([c.x,c.y]); cx=c.x; cy=c.y; }
    else if(c.type==='C'){ for(let t=1;t<=steps;t++) ring.push(bez([[cx,cy],[c.x1,c.y1],[c.x2,c.y2],[c.x,c.y]],t/steps)); cx=c.x; cy=c.y; }
    else if(c.type==='Q'){ for(let t=1;t<=steps;t++) ring.push(bez([[cx,cy],[c.x1,c.y1],[c.x,c.y]],t/steps)); cx=c.x; cy=c.y; }
    else if(c.type==='Z'){ if(ring.length>=3) rings.push(ring); ring=[]; }
  }
  if(ring.length>=3) rings.push(ring);
  return rings;
}
function fitCells(cs, W, H, pad){
  let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;
  for(const c of cs) for(const r of c.rings) for(const [x,y] of r){ mnx=Math.min(mnx,x);mny=Math.min(mny,y);mxx=Math.max(mxx,x);mxy=Math.max(mxy,y); }
  const bw=(mxx-mnx)||1, bh=(mxy-mny)||1, s=Math.min((W-2*pad)/bw,(H-2*pad)/bh);
  const tx=(W-bw*s)/2-mnx*s, ty=(H-bh*s)/2-mny*s;
  for(const c of cs) for(const r of c.rings) for(const p of r){ p[0]=p[0]*s+tx; p[1]=p[1]*s+ty; }
}
document.getElementById('loadfont').onclick=()=>{
  if(typeof opentype==='undefined'){ alert('Font library failed to load (needs network for opentype.js).'); return; }
  document.getElementById('fontfile').click();
};
document.getElementById('fontfile').onchange=function(){
  const f=this.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ loadedFont=opentype.parse(r.result);
      document.getElementById('placefont').disabled=false;
      document.getElementById('placefont').textContent='▰ Place '+(loadedFont.names&&loadedFont.names.fontFamily?Object.values(loadedFont.names.fontFamily)[0]:'font');
    }catch(err){ alert('Could not parse that font: '+err.message); } this.value=''; };
  r.readAsArrayBuffer(f);
};
document.getElementById('placefont').onclick=()=>{
  if(!loadedFont){ alert('Load a font file first (⤒ Font).'); return; }
  const txt=document.getElementById('fonttext').value||'';
  const size=Math.max(50,+document.getElementById('fontsize').value||900);
  const paths=loadedFont.getPaths(txt,0,0,size);                 // one path per glyph
  const glyphCells=paths.map(p=>({rings:cmdsToRings(p.commands),glyph:true})).filter(c=>c.rings.length);
  if(!glyphCells.length){ alert('That text produced no outlines (whitespace / missing glyphs).'); return; }
  pushHistory();
  fitCells(glyphCells, 1280, 1280, 120);                          // scale to fit the canvas, centered
  activeCells().push(...glyphCells); activeEditor().clearSelection(); renderAll(); scheduleSave();
};

// ============================================================================
//  Autosave + load: serialize the whole store (guides/angles + per-glyph cells)
//  to localStorage, debounced. applyProject() is the single rehydrate path,
//  reused by the later JSON-import task.
// ============================================================================
function serializeStore(){
  const glyphs={};
  for(const [c,g] of GLYPHS) glyphs[c]={cells:g.cells, split:g.split, detached:g.detached, localGuides:g.localGuides};
  return {v:1, K, oAngle, dAngle, hG, oG, dG, nextId, glyphs, metrics};
}
let _saveT=null;
function scheduleSave(){ clearTimeout(_saveT); _saveT=setTimeout(saveStore, 400); }
function saveStore(){ try{ localStorage.setItem('z-type-store', JSON.stringify(serializeStore())); }catch(e){} }
function loadStore(){
  let raw; try{ raw=localStorage.getItem('z-type-store'); }catch(e){ return false; }
  if(!raw) return false;
  try{ applyProject(JSON.parse(raw)); return true; }catch(e){ return false; }
}
function applyProject(p){       // also reused by Task 8 JSON import
  K=p.K; oAngle=p.oAngle; dAngle=p.dAngle; hG=p.hG; oG=p.oG; dG=p.dG; nextId=p.nextId;
  if(p.metrics) Object.assign(metrics, p.metrics);
  GLYPHS.clear();
  for(const c in p.glyphs){ const g=p.glyphs[c];
    GLYPHS.set(c,{cells:g.cells||[], split:!!g.split, detached:!!g.detached, localGuides:g.localGuides||null}); }
  syncObliqueUI(); syncAngleUI(); updateSlope(); syncMetricUI();
}

// metric numeric input wiring
document.querySelectorAll('.mnum').forEach(inp=>{
  inp.addEventListener('change', ()=>{ pushHistory(); metrics[inp.dataset.m]=+inp.value||0; renderAll(); scheduleSave(); });
});
syncMetricUI();

loadStore();        // rehydrate before the first paint
renderAll();
</script>
